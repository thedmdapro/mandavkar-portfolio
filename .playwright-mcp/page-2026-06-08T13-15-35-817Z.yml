          - generic [ref=e119]:
            - generic [ref=e120]: Origin
            - paragraph [ref=e121]: Financial behaviour doesn't generalise across borders. I learned that growing up across Saudi Arabia, South Korea, China, and India, four different relationships with money and risk. Most Western models assume Western financial psychology. The gaps between that assumption and how the rest of the world actually behaves are where the signals live.
        - generic [ref=e122]:
          - generic [ref=e123]: "02"
          - generic [ref=e124]:
            - generic [ref=e125]: Lens
            - paragraph [ref=e126]: "The physical economy moves before the financial one prices it. So before I open an earnings report, I check upstream: Baltic Dry, LNG spot, commodity flows, shipping disruptions. Red Sea rerouting, Hormuz risk, rare earth concentration. The lag between physical disruption and financial adjustment is where the research questions are."
        - generic [ref=e127]:
          - generic [ref=e128]: "03"
          - generic [ref=e129]:
            - generic [ref=e130]: Method
            - paragraph [ref=e131]: "Every piece follows the same path: start with a physical or macro signal, verify it across sources, trace it down to sectors and securities. The live dashboard pulls 21 FRED indicators on every load; the 12 structural theses connect supply-chain shifts to specific asset classes. The point isn't prediction. It's surfacing questions before they become consensus."
        - generic [ref=e132]:
          - generic [ref=e133]: "04"
          - generic [ref=e134]:
            - generic [ref=e135]: Maritime
            - paragraph [ref=e136]: Maritime trade is my particular focus, the physical infrastructure most models treat as given. Chinese yards build over half the world's ships, run the largest merchant fleet, and have embedded military conversion requirements into civilian vessels by law since 2016. Beidou tracks the entire fleet in real time; Chinese waters went dark to global AIS in 2021. These are freight, energy-security, and capital-allocation stories, not defence ones.
        - generic [ref=e137]:
