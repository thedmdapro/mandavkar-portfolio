    - generic [ref=e533]:
      - article [ref=e534]:
        - generic [ref=e535]:
          - generic [ref=e536]: "01"
          - generic [ref=e537]: Commodities
        - generic [ref=e538]:
          - blockquote [ref=e540]: "\"Physical signals are the only macro data that can't be managed.\""
          - generic [ref=e541]:
            - generic [ref=e542]: The evidence
            - paragraph [ref=e543]: The Baltic Dry Index doesn't have an investor relations team. Corn doesn't have forward guidance. LNG spot prices don't get revised three months later. When physical commodity signals diverge from equity markets or central bank narratives, I trust the ships, the grain, and the gas. One of them is reflecting reality, and it's never the press release.
      - article [ref=e544]:
        - generic [ref=e545]:
          - generic [ref=e546]: "02"
          - generic [ref=e547]: India
        - generic [ref=e548]:
          - blockquote [ref=e550]: "\"India's retail investment boom is structurally underestimated.\""
          - generic [ref=e551]:
            - generic [ref=e552]: The evidence
            - paragraph [ref=e553]: India went from 40 million to over 190 million demat accounts in six years. Global analysts model this as a cyclical trend. It isn't. It's a structural shift driven by smartphones, UPI infrastructure, and a generation that trusts markets over bank deposits. The wealth management industry hasn't priced the scale of what's coming, and the monthly SIP data is the cleanest signal of whether it continues.
      - article [ref=e554]:
        - generic [ref=e555]:
          - generic [ref=e556]: "03"
          - generic [ref=e557]: Energy
        - generic [ref=e558]:
          - blockquote [ref=e560]: "\"Nuclear energy is the most mispriced asset class in the world right now.\""
          - generic [ref=e561]:
            - generic [ref=e562]: The evidence
            - paragraph [ref=e563]: AI data centres are repricing power demand faster than grids can respond, a single LLM training run draws as much electricity as a small city for weeks. Uranium supply is constrained, mine output lags reactor restarts, and enrichment is concentrated in Russia and China. New builds take a decade. Companies that own operating nuclear capacity today are priced for a low-growth utility world, not an AI power supercycle. The repricing has started, nowhere near done.
      - article [ref=e564]:
        - generic [ref=e565]:
          - generic [ref=e566]: "04"
          - generic [ref=e567]: Geopolitics
        - generic [ref=e568]:
          - blockquote [ref=e570]: "\"Geopolitical realignment creates pricing dislocations that DCF can't see.\""
          - generic [ref=e571]:
            - generic [ref=e572]: The evidence
            - paragraph [ref=e573]: The Hormuz closure threatens one-third of global helium supply and 20% of LNG simultaneously. The Russia-Ukraine war rewired European energy infrastructure permanently. Standard valuation models don't price geopolitical risk, they can't, because the inputs don't appear in earnings forecasts or discount rates. Which means every dislocation it creates is, for a brief window, mispriced. That window is where the trade is.
      - article [ref=e574]:
        - generic [ref=e575]:
          - generic [ref=e576]: "05"
          - generic [ref=e577]: Market Microstructure
        - generic [ref=e578]:
          - blockquote [ref=e580]: "\"Crypto regulation creates more volatility than it suppresses, at least in the short run.\""
          - generic [ref=e581]:
            - generic [ref=e582]: The evidence
            - paragraph [ref=e583]: "Not a political position, it's consistent with my dissertation findings on crypto volatility around regulatory events. In the data, regulation stabilised traditional securities (the S&P 500 barely moved) while amplifying crypto volatility. The mechanism is speculative: announcements reset participation expectations, triggering price discovery in a market with no institutional stabiliser. MiCA may change that over 5–10 years as the institutional base deepens. For now, regulation and crypto volatility move together, not against."
