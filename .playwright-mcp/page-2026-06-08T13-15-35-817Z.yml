        - generic [ref=e709]: Thinking About
        - generic [ref=e710]:
          - paragraph [ref=e711]:
            - text: "?"
            - strong [ref=e712]: What happens when the yen carry trade fully unwinds?
            - text: BOJ normalisation is unwinding the largest carry trade in history. If USDJPY breaks below 140, forced deleveraging cascades through every risk asset at once.
            - emphasis [ref=e713]: "Where I lean:"
            - text: most portfolios have zero hedging for this. The asymmetry favours owning volatility, the unwind will be non-linear, with a cross-asset correlation spike unlike anything since March 2020.
          - paragraph [ref=e714]:
            - text: "?"
            - strong [ref=e715]: Can the green transition happen at current copper prices?
            - text: Electrification, grid buildout, and data-centre cooling all need copper, but mining capex peaked a decade ago and new projects take 10+ years.
            - emphasis [ref=e716]: "Where I lean:"
            - text: no. The transition needs prices well above spot to pull in new supply, so either copper reprices up or the timeline slips. Either way, miners with permitted reserves are undervalued.
          - paragraph [ref=e717]:
            - text: "?"
            - strong [ref=e718]: Who absorbs the margin compression from Chinese overcapacity?
            - text: China is exporting deflation, overcapacity in EVs, solar, and steel dumping cheap goods globally. Tariffs slow it, not stop it.
            - emphasis [ref=e719]: "Where I lean:"
            - text: European industrials are most exposed, especially chemicals and basic materials already squeezed by energy costs. Indian manufacturers have partial tariff cover but stay vulnerable on inputs. Watch BASF, Thyssenkrupp, and Tata Steel Europe.
          - paragraph [ref=e720]:
            - text: "?"
            - strong [ref=e721]: Who controls the uranium enrichment bottleneck?
            - text: Even if the West restarts nuclear at scale, enrichment is the chokepoint. Russia's Rosatom controls ~40% of global enrichment; US and European centrifuge capacity takes years to build.
            - emphasis [ref=e722]: "Where I lean:"
            - text: enrichment is the real constraint, not reactor builds or even mining. Whoever secures it first sets the terms for the nuclear renaissance. An energy-security story disguised as a utility one.
